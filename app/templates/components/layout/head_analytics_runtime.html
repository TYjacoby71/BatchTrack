{#
Synopsis:
Shared analytics runtime helpers and page-level event capture wiring.
#}
{% if load_analytics %}
<script>
  (function() {
    var FIRST_LANDING_STORAGE_KEY = 'bt:first_landing_at';
    var FIRST_LANDING_COOKIE_KEY = 'bt_first_landing_at';
    var ATTRIBUTION_STORAGE_KEY = 'bt:attribution_params';
    var ATTRIBUTION_COOKIE_PREFIX = 'bt_attr_';
    var ATTRIBUTION_KEYS = ['gclid', 'wbraid', 'gbraid'];

    function nowMs() {
      return Date.now ? Date.now() : new Date().getTime();
    }

    function parseInteger(value) {
      if (value === null || value === undefined || value === '') {
        return null;
      }
      var parsed = Number.parseInt(String(value), 10);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function getCookie(name) {
      var escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var match = document.cookie.match(new RegExp('(?:^|; )' + escaped + '=([^;]*)'));
      return match ? decodeURIComponent(match[1]) : null;
    }

    function setCookie(name, value) {
      try {
        document.cookie = name + '=' + encodeURIComponent(String(value)) + '; path=/; max-age=31536000; SameSite=Lax';
      } catch (error) {}
    }

    function normalizeAttributionValue(value) {
      if (value === null || value === undefined) {
        return null;
      }
      var parsed = String(value).trim();
      if (!parsed) {
        return null;
      }
      if (parsed.length > 256) {
        parsed = parsed.slice(0, 256);
      }
      return parsed;
    }

    function readStoredAttribution() {
      var payload = {};
      var parsedStorage = null;
      try {
        if (window.localStorage) {
          var raw = window.localStorage.getItem(ATTRIBUTION_STORAGE_KEY);
          if (raw) {
            parsedStorage = JSON.parse(raw);
          }
        }
      } catch (error) {}

      ATTRIBUTION_KEYS.forEach(function(key) {
        var fromStorage = parsedStorage && typeof parsedStorage === 'object'
          ? normalizeAttributionValue(parsedStorage[key])
          : null;
        var fromCookie = normalizeAttributionValue(getCookie(ATTRIBUTION_COOKIE_PREFIX + key));
        var selected = fromStorage || fromCookie || null;
        if (selected) {
          payload[key] = selected;
        }
      });
      return payload;
    }

    function readAttributionFromUrl() {
      var payload = {};
      try {
        var params = new URLSearchParams(window.location.search || '');
        ATTRIBUTION_KEYS.forEach(function(key) {
          var value = normalizeAttributionValue(params.get(key));
          if (value) {
            payload[key] = value;
          }
        });
      } catch (error) {}
      return payload;
    }

    function persistAttribution(payload) {
      if (!payload || typeof payload !== 'object') {
        return;
      }
      ATTRIBUTION_KEYS.forEach(function(key) {
        var normalized = normalizeAttributionValue(payload[key]);
        if (normalized) {
          setCookie(ATTRIBUTION_COOKIE_PREFIX + key, normalized);
        }
      });
      try {
        if (window.localStorage) {
          window.localStorage.setItem(ATTRIBUTION_STORAGE_KEY, JSON.stringify(payload));
        }
      } catch (error) {}
    }

    function resolveAttributionParams() {
      var stored = readStoredAttribution();
      var fromUrl = readAttributionFromUrl();
      var merged = Object.assign({}, stored, fromUrl);
      persistAttribution(merged);
      return merged;
    }

    function resolveFirstLandingAt() {
      var fromStorage = null;
      try {
        fromStorage = parseInteger(window.localStorage && window.localStorage.getItem(FIRST_LANDING_STORAGE_KEY));
      } catch (error) {}
      var fromCookie = parseInteger(getCookie(FIRST_LANDING_COOKIE_KEY));
      var first = fromStorage || fromCookie;
      if (!first) {
        first = nowMs();
      }
      try {
        if (window.localStorage) {
          window.localStorage.setItem(FIRST_LANDING_STORAGE_KEY, String(first));
        }
      } catch (error) {}
      setCookie(FIRST_LANDING_COOKIE_KEY, String(first));
      return first;
    }

    function canCapture() {
      return Boolean(
        window.posthog &&
        typeof window.posthog.capture === 'function'
      );
    }

    var firstLandingAt = resolveFirstLandingAt();
    var attributionParams = resolveAttributionParams();
    var firstLandingRecordedKey = 'bt:first_landing_recorded_sent';

    window.BTAnalytics = window.BTAnalytics || {};
    window.BTAnalytics.getFirstLandingAt = function() {
      return firstLandingAt;
    };
    window.BTAnalytics.secondsSinceFirstLanding = function() {
      var elapsedMs = Math.max(0, nowMs() - firstLandingAt);
      return Math.round(elapsedMs / 1000);
    };
    window.BTAnalytics.getAttributionParams = function() {
      return Object.assign({}, attributionParams);
    };
    window.BTAnalytics.appendAttributionToPayload = function(payload) {
      var target = payload && typeof payload === 'object'
        ? payload
        : {};
      ATTRIBUTION_KEYS.forEach(function(key) {
        var value = normalizeAttributionValue(attributionParams[key]);
        if (value) {
          target[key] = value;
        }
      });
      return target;
    };
    window.BTAnalytics.capture = function(eventName, properties) {
      if (!eventName || !canCapture()) {
        return;
      }
      var payload = Object.assign(
        {
          seconds_since_first_landing: window.BTAnalytics.secondsSinceFirstLanding(),
          page_path: window.location.pathname,
          page_url: window.location.href
        },
        properties || {}
      );
      window.BTAnalytics.appendAttributionToPayload(payload);
      try {
        window.posthog.capture(eventName, payload);
      } catch (error) {}
    };
    window.BTAnalyticsEvents = window.BTAnalyticsEvents || {
      emit: function(eventName, properties) {
        window.BTAnalytics.capture(eventName, properties || {});
      },
      proceedToCheckout: function(properties) {
        window.BTAnalytics.capture('proceed_to_checkout', properties || {});
      }
    };

    document.addEventListener('DOMContentLoaded', function() {
      var body = document.body || null;
      var isAuthenticated = body ? body.getAttribute('data-authenticated') === 'true' : false;
      var userId = body ? body.getAttribute('data-user-id') : '';
      var orgId = body ? body.getAttribute('data-org-id') : '';
      var endpoint = body ? body.getAttribute('data-page-endpoint') : '';

      if (canCapture() && isAuthenticated && userId) {
        try {
          window.posthog.identify(String(userId), {
            organization_id: orgId || null,
            authenticated: true
          });
          if (orgId && typeof window.posthog.group === 'function') {
            window.posthog.group('organization', String(orgId));
          }
        } catch (error) {}
      }

      try {
        if (canCapture() && window.localStorage && !window.localStorage.getItem(firstLandingRecordedKey)) {
          window.BTAnalytics.capture('first_landing_recorded', {
            first_landing_at_ms: firstLandingAt
          });
          window.localStorage.setItem(firstLandingRecordedKey, '1');
        }
      } catch (error) {}

      window.BTAnalytics.capture('page_context_viewed', {
        page_endpoint: endpoint || '',
        authenticated: isAuthenticated
      });

      var pageEnteredAt = nowMs();
      var dwellSent = false;
      var sendDwell = function() {
        if (dwellSent) {
          return;
        }
        dwellSent = true;
        var dwellSeconds = Math.max(0, Math.round((nowMs() - pageEnteredAt) / 1000));
        window.BTAnalytics.capture('page_dwell_recorded', {
          page_endpoint: endpoint || '',
          seconds_on_page: dwellSeconds,
          authenticated: isAuthenticated
        });
      };
      window.addEventListener('pagehide', sendDwell, { once: true });
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          sendDwell();
        }
      });

      document.addEventListener('click', function(event) {
        var anchor = event.target && event.target.closest ? event.target.closest('a[href]') : null;
        if (!anchor) {
          return;
        }
        var href = anchor.getAttribute('href') || '';
        if (!href || href.startsWith('#')) {
          return;
        }
        var url;
        try {
          url = new URL(href, window.location.origin);
        } catch (error) {
          return;
        }
        var path = url.pathname || '';
        var ctaText = (anchor.textContent || '').trim().slice(0, 120);
        var normalizedCtaText = ctaText.toLowerCase().replace(/\s+/g, ' ').trim();
        var isSignupDestination = path.includes('/signup');
        var isLoginDestination = path.includes('/auth/login');
        if (isSignupDestination) {
          var signupSource = url.searchParams.get('source') || null;
          var sourceLooksFreeTrial = typeof signupSource === 'string' && signupSource.indexOf('start_free_trial') >= 0;
          var textLooksFreeTrial = normalizedCtaText.indexOf('14 day free trial') >= 0 || normalizedCtaText.indexOf('14day free trial') >= 0;
          var isFreeTrialCta = sourceLooksFreeTrial || textLooksFreeTrial;
          window.BTAnalytics.capture('public_signup_cta_clicked', {
            cta_text: ctaText,
            cta_intent: isFreeTrialCta ? 'free_trial' : 'signup',
            cta_location: signupSource || endpoint || path || 'unknown',
            signup_source: signupSource,
            destination_path: path,
            destination_type: 'signup',
            billing_mode: url.searchParams.get('billing_mode') || null,
            billing_cycle: url.searchParams.get('billing_cycle') || null,
            tier: url.searchParams.get('tier') || null,
            lifetime_tier: url.searchParams.get('lifetime_tier') || null
          });
        }
      });
    });
  })();
</script>
{% endif %}
