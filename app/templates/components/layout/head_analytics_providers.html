{% set gtag_loader_id = ga_measurement_id or google_ads_conversion_id %}
{% if gtag_loader_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ gtag_loader_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  {% if ga_measurement_id %}
  gtag('config', {{ ga_measurement_id | tojson }}, {
    anonymize_ip: true
  });
  {% endif %}
  {% if google_ads_conversion_id %}
  gtag('config', {{ google_ads_conversion_id | tojson }});
  {% endif %}
</script>
{% endif %}

  'https://connect.facebook.net/en_US/fbevents.js');

    src="https://www.facebook.com/tr?id={{ meta_pixel_id }}&amp;ev=PageView&amp;noscript=1"
    alt=""
  />
</noscript>
{% endif %}
